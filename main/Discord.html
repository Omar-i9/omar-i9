<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta property="og:image" content="https://omar-i9.github.io/omar-i9/photo/profile.jpeg">
  <title>gdmi_3 — Discord</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    :root {
      --void: #05060f;
      --purple: #a855f7;
      --cyan: #22d3ee;
      --gold: #f59e0b;
      --red: #ef4444;
      --text: #eef2ff;
      --muted: rgba(238,242,255,0.52);
      --hint: rgba(238,242,255,0.26);
      --surface: rgba(255,255,255,0.042);
      --border: rgba(255,255,255,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--void);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* Aurora */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .ab {
      position: absolute; border-radius: 50%;
      filter: blur(100px); mix-blend-mode: screen;
    }
    .ab1 {
      width: 480px; height: 480px; top: -180px; left: -160px; opacity: .55;
      background: radial-gradient(circle, rgba(168,85,247,.5), transparent 65%);
      animation: ab1 15s ease-in-out infinite alternate;
    }
    .ab2 {
      width: 420px; height: 420px; bottom: -130px; right: -120px; opacity: .45;
      background: radial-gradient(circle, rgba(34,211,238,.4), transparent 65%);
      animation: ab2 17s ease-in-out infinite alternate;
    }
    @keyframes ab1 { to { transform: translate(70px, 90px) scale(1.2); } }
    @keyframes ab2 { to { transform: translate(-60px, -70px) scale(1.18); } }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(168,85,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,.03) 1px, transparent 1px);
      background-size: 46px 46px;
    }

    /* Particles */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .ptcl {
      position: absolute; border-radius: 50%;
      animation: ptclUp linear infinite; opacity: 0;
    }
    @keyframes ptclUp {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      8%   { opacity: var(--op); }
      92%  { opacity: calc(var(--op) * .35); }
      100% { transform: translateY(-110vh) translateX(var(--dx)); opacity: 0; }
    }

    /* Wrap */
    .wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }

    /* Card */
    .card {
      width: min(100%, 420px);
      border-radius: 26px;
      background: linear-gradient(170deg, rgba(14,18,40,.8), rgba(6,8,18,.76));
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(168,85,247,.2);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 35px 90px rgba(0,0,0,.65),
        0 0 100px rgba(168,85,247,.08);
      overflow: hidden;
    }

    /* Banner */
    .banner {
      height: 96px; position: relative; overflow: hidden;
      background: linear-gradient(145deg, #1b0d38 0%, #0d1c44 50%, #091529 100%);
    }
    .banner-aura {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 12% 55%, rgba(168,85,247,.72) 0%, transparent 48%),
        radial-gradient(ellipse at 88% 40%, rgba(34,211,238,.58) 0%, transparent 48%),
        radial-gradient(ellipse at 50% 115%, rgba(245,158,11,.22) 0%, transparent 52%);
      animation: bannerPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bannerPulse { to { opacity: .88; transform: scale(1.06); } }
    .banner-beam {
      position: absolute; inset: 0; overflow: hidden;
    }
    .banner-beam::after {
      content: ''; position: absolute;
      width: 180%; height: 1px; top: 38%;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,.6), rgba(34,211,238,.55), rgba(168,85,247,.5), transparent);
      animation: beamMove 5s linear infinite;
    }
    @keyframes beamMove { from { transform: translateX(-70%); } to { transform: translateX(30%); } }
    .bstars { position: absolute; inset: 0; }
    .bstar { position: absolute; border-radius: 50%; background: white; animation: bTwinkle ease-in-out infinite; }
    @keyframes bTwinkle { 0%,100% { opacity:.12; transform:scale(1); } 50% { opacity:.9; transform:scale(1.7); } }

    /* Avatar section */
    .av-area { position: relative; padding: 0 20px; }
    .av-wrap {
      position: absolute; top: -48px; right: 20px; z-index: 10;
    }
    .av-glow {
      position: absolute; inset: -5px; border-radius: 50%;
      background: conic-gradient(from 0deg, #a855f7, #22d3ee, #f59e0b, #ec4899, #a855f7);
      filter: blur(7px); opacity: .65;
      animation: glowSpin 5s linear infinite;
    }
    @keyframes glowSpin { to { transform: rotate(360deg); } }
    .av-ring {
      width: 86px; height: 86px; border-radius: 50%; padding: 3px;
      background: conic-gradient(from 0deg, #a855f7, #22d3ee, #f59e0b, #a855f7);
      animation: ringSpin 4s linear infinite; position: relative; z-index: 1;
    }
    @keyframes ringSpin { to { transform: rotate(360deg); } }
    .av-img {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; display: block;
      border: 3px solid #05060f; background: #0a0e20;
    }

    /* Busy status */
    .busy-badge {
      position: absolute; bottom: 2px; left: 0px; z-index: 12;
      display: flex; align-items: center; gap: 5px;
      background: rgba(5,6,15,.9); border: 1px solid rgba(239,68,68,.3);
      border-radius: 999px; padding: 3px 9px 3px 5px;
      backdrop-filter: blur(8px);
    }
    .busy-dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 0 rgba(239,68,68,.7);
      animation: busyPulse 1.8s ease-in-out infinite;
      flex: 0 0 auto;
    }
    @keyframes busyPulse {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.7); }
      60%  { box-shadow: 0 0 0 7px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .busy-label {
      font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.4px; color: #fca5a5;
    }

    /* Nitro badge */
    .nitro {
      position: absolute; bottom: -3px; right: -3px; z-index: 13;
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg,#a855f7,#6366f1);
      border: 2.5px solid #05060f;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      box-shadow: 0 0 10px rgba(168,85,247,.6);
    }

    /* Info */
    .info { padding: 54px 20px 0; }
    .dname {
      font-size: 1.32rem; font-weight: 800; letter-spacing: -.3px; line-height: 1.2; margin-bottom: 4px;
      background: linear-gradient(120deg, #fff 20%, rgba(168,85,247,.95) 72%, rgba(34,211,238,.9));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .urow {
      display: flex; align-items: center; gap: 7px;
      font-size: .83rem; color: var(--muted); margin-bottom: 14px;
    }
    .utag { color: rgba(168,85,247,.9); font-weight: 700; font-size: .87rem; font-family: monospace; }
    .usep { color: var(--hint); font-size: .7rem; }

    /* Badges */
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .bdg {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 999px;
      font-size: .72rem; font-weight: 700; letter-spacing: .3px;
      white-space: nowrap;
      transition: transform .2s ease;
      cursor: default;
    }
    .bdg:hover { transform: translateY(-2px); }
    .bdg-p { background: rgba(168,85,247,.13); border: 1px solid rgba(168,85,247,.3); color: #c084fc; }
    .bdg-g { background: rgba(245,158,11,.1);  border: 1px solid rgba(245,158,11,.28); color: #fcd34d; }
    .bdg-c { background: rgba(34,211,238,.09);  border: 1px solid rgba(34,211,238,.26); color: #67e8f9; }
    .bdg-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 5px currentColor; }

    /* Divider */
    .div { height: 1px; margin: 12px 20px; background: linear-gradient(90deg, transparent, rgba(168,85,247,.2), rgba(34,211,238,.14), transparent); }

    /* Hint line */
    .hint-line {
      margin: 0 20px 14px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(168,85,247,.07);
      border: 1px solid rgba(168,85,247,.16);
      display: flex; align-items: center; gap: 9px;
      font-size: .78rem; color: var(--muted);
    }
    .hint-icon { font-size: .95rem; flex: 0 0 auto; }

    /* Copy */
    .copy-area { padding: 0 20px 8px; }
    .copy-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 9px;
    }
    .copy-meta-l { font-size: .64rem; font-weight: 800; letter-spacing: .9px; text-transform: uppercase; color: var(--muted); }
    .copy-meta-r { display: flex; align-items: center; gap: 5px; font-size: .67rem; color: var(--hint); }

    .copy-btn {
      width: 100%; border: 0; border-radius: 16px; padding: 0;
      background: transparent; cursor: pointer; position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-inner {
      width: 100%; padding: 17px 20px;
      background: linear-gradient(135deg, rgba(168,85,247,.92), rgba(99,102,241,.92));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 1.05rem; font-weight: 800; color: white; letter-spacing: .2px;
      border: 1px solid rgba(168,85,247,.5);
      box-shadow: 0 0 38px rgba(168,85,247,.3), 0 8px 22px rgba(0,0,0,.4);
      position: relative; z-index: 1; overflow: hidden;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .copy-inner::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(130deg, rgba(255,255,255,.17), transparent 45%);
    }
    .copy-btn:active .copy-inner { transform: scale(.97); box-shadow: 0 0 18px rgba(168,85,247,.18), 0 4px 12px rgba(0,0,0,.4); }
    .copy-icon { flex: 0 0 auto; transition: transform .3s ease; }
    .copy-btn:hover .copy-icon { transform: rotate(-12deg) scale(1.12); }

    .scanner { position: absolute; inset: 0; border-radius: 16px; overflow: hidden; pointer-events: none; z-index: 2; }
    .scanner::after {
      content: ''; position: absolute; inset: 0; width: 36%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      animation: beamScan 2.8s ease-in-out infinite;
    }
    @keyframes beamScan { from { transform: translateX(-200%); } to { transform: translateX(500%); } }

    .ripple-ring {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,.25);
      transform: scale(0); animation: rippleGo .65s linear forwards; pointer-events: none;
    }
    @keyframes rippleGo { to { transform: scale(4.5); opacity: 0; } }

    /* Interactive row */
    .int-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 20px; }
    .int-btn {
      border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px;
      background: var(--surface); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--muted); font-size: .72rem; font-weight: 700;
      transition: border-color .2s ease, background .2s ease, transform .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .int-btn:active { transform: scale(.96); }
    .int-btn:hover { border-color: rgba(168,85,247,.35); background: rgba(168,85,247,.07); color: #c084fc; }
    .int-emoji { font-size: 1.25rem; transition: transform .3s ease; }
    .int-btn:hover .int-emoji { transform: scale(1.2); }

    /* Ping animation */
    @keyframes pingShake {
      0%,100% { transform: rotate(0deg); }
      20% { transform: rotate(-20deg); }
      40% { transform: rotate(20deg); }
      60% { transform: rotate(-15deg); }
      80% { transform: rotate(12deg); }
    }
    .shaking { animation: pingShake .5s ease !important; }

    /* Waving hand animation */
    @keyframes waveHand {
      0%,100% { transform: rotate(0deg); }
      20% { transform: rotate(25deg); }
      40% { transform: rotate(-10deg); }
      60% { transform: rotate(25deg); }
      80% { transform: rotate(-5deg); }
    }
    .waving { animation: waveHand .6s ease !important; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 20px 8px; }
    .stat {
      padding: 12px 8px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      text-align: center;
      transition: transform .2s ease, border-color .2s ease; cursor: default;
    }
    .stat:hover { transform: translateY(-3px); border-color: rgba(168,85,247,.35); }
    .stat-v {
      display: block; font-size: 1.06rem; font-weight: 800;
      background: linear-gradient(135deg,#a855f7,#22d3ee);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 3px;
    }
    .stat-l { font-size: .65rem; color: var(--hint); font-weight: 600; }

    /* Typing indicator */
    .typing-bar {
      margin: 4px 20px 12px;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: .74rem; color: var(--hint);
    }
    .typing-dots { display: flex; gap: 3px; }
    .typing-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(168,85,247,.7);
      animation: typeDot 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .25s; }
    .typing-dots span:nth-child(3) { animation-delay: .5s; }
    @keyframes typeDot {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(168,85,247,.1);
      background: rgba(0,0,0,.22);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-l { display: flex; align-items: center; gap: 8px; font-size: .74rem; color: var(--hint); }
    .footer-disc { width: 20px; height: 20px; opacity: .4; animation: logoFloat 6s ease-in-out infinite; }
    @keyframes logoFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
    .footer-r { display: flex; align-items: center; gap: 5px; font-size: .7rem; color: var(--hint); }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100% { box-shadow:0 0 4px var(--red); } 50% { box-shadow:0 0 12px var(--red); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: rgba(6,8,18,.97); border: 1px solid rgba(168,85,247,.42);
      color: var(--text); padding: 12px 20px; border-radius: 999px;
      font-size: .87rem; font-weight: 700;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      opacity: 0; pointer-events: none;
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 14px 50px rgba(0,0,0,.5), 0 0 28px rgba(168,85,247,.22);
      z-index: 100;
      display: flex; align-items: center; gap: 9px; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-ck {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg,#a855f7,#22d3ee);
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 auto; font-size: 11px; font-weight: 900; color: white;
    }

    /* Back btn */
    .back-btn {
      position: fixed; top: 18px; right: 18px; z-index: 50;
      border: 1px solid rgba(168,85,247,.35); border-radius: 999px; padding: 10px 18px;
      background: rgba(6,8,18,.88); backdrop-filter: blur(12px);
      color: var(--muted); cursor: pointer;
      font-size: .83rem; font-weight: 700;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      transition: all .2s ease;
    }
    .back-btn:hover { border-color: var(--purple); color: var(--purple); }

    /* Popup overlay */
    .popup-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
      padding: 20px;
    }
    .popup-overlay.show { opacity: 1; pointer-events: all; }
    .popup {
      width: min(100%, 320px);
      background: rgba(10,12,28,.97);
      border: 1px solid rgba(168,85,247,.3);
      border-radius: 20px; padding: 24px 22px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(168,85,247,.12);
      text-align: center;
      transform: scale(.9) translateY(10px);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .popup-overlay.show .popup { transform: scale(1) translateY(0); }
    .popup-emoji { font-size: 2.2rem; margin-bottom: 10px; }
    .popup-title { font-size: 1rem; font-weight: 800; margin-bottom: 6px; }
    .popup-body { font-size: .82rem; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }
    .popup-close {
      border: 1px solid rgba(168,85,247,.3); border-radius: 12px; padding: 10px 24px;
      background: rgba(168,85,247,.1); color: #c084fc;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .84rem; font-weight: 700; cursor: pointer;
      transition: all .2s ease;
    }
    .popup-close:hover { background: rgba(168,85,247,.2); }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>

  <div class="aurora" aria-hidden="true">
    <div class="ab ab1"></div>
    <div class="ab ab2"></div>
  </div>
  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <button class="back-btn" id="backBtn" type="button">← عودة</button>


  <main class="wrap">
    <section class="card" aria-label="Discord profile card">

      <!-- Banner -->
      <div class="banner">
        <div class="banner-aura"></div>
        <div class="banner-beam"></div>
        <div class="bstars" id="bstars"></div>
      </div>

      <!-- Avatar -->
      <div class="av-area">
        <div class="av-wrap">
          <div class="av-glow"></div>
          <div class="av-ring">
            <img class="av-img"
              src="https://omar-i9.github.io/omar-i9/photo/profile.jpeg"
              alt="Omar">
          </div>
          <div class="busy-badge">
            <div class="busy-dot"></div>
            <span class="busy-label">Busy</span>
          </div>
          <div class="nitro">⚡</div>
        </div>
      </div>

      <!-- Name -->
      <div class="info">
        <div class="dname">عُـمَر | Omar</div>
        <div class="urow">
          <span class="utag">gdmi_3</span>
          <span class="usep">•</span>
          <span style="font-size:.72rem;color:rgba(252,165,165,.85);">Busy</span>
        </div>
      </div>

      <div class="div"></div>

      <!-- Hint -->
      <div class="hint-line">
        <span class="hint-icon">🔗</span>
        <span>مش قادر أشارك رابط ديسكورد — انسخ اليوزر وابحث عني من هناك</span>
      </div>

      <!-- Copy button -->
      <div class="copy-area">
        <div class="copy-meta">
          <span class="copy-meta-l">Username</span>
          <div class="copy-meta-r">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            اضغط للنسخ
          </div>
        </div>
        <button class="copy-btn" id="copyBtn" type="button" aria-label="نسخ اليوزر">
          <div class="copy-inner" id="btnInner">
            <svg class="copy-icon" width="20" height="20" viewBox="0 0 24 24" fill="white" aria-hidden="true">
              <path d="M19 2H8a2 2 0 0 0-2 2v11h2V4h11V2Zm3 4H12a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2Zm0 16H12V8h10v14Z"/>
            </svg>
            <span id="btnText">gdmi_3</span>
          </div>
          <div class="scanner"></div>
        </button>
      </div>

      <div class="div"></div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-l">
          <svg class="footer-disc" viewBox="0 0 24 24" fill="white" aria-hidden="true">
            <path d="M20.32 4.37A19.8 19.8 0 0 0 15.9 3l-.2.4c1.6.4 2.8 1 3.8 1.7-1.6-.8-3.1-1.3-4.6-1.6a19.1 19.1 0 0 0-6.8 0c-1.5.3-3 .8-4.6 1.6 1-.7 2.2-1.3 3.8-1.7l-.2-.4A19.8 19.8 0 0 0 3.68 4.37C1.6 7.5.9 10.5 1.1 13.4c2 1.6 4 2.5 5.9 3.1l.7-1.1c-.7-.3-1.4-.6-2.1-1.1l.5-.4c4.1 1.9 8.2 1.9 12.2 0l.5.4c-.7.5-1.4.8-2.1 1.1l.7 1.1c1.9-.6 3.9-1.5 5.9-3.1.2-2.9-.5-5.9-2.5-9.03Z"/>
          </svg>
          <span>gdmi_3</span>
        </div>
        <div class="footer-r">
          <div class="live-dot"></div>
          <span>Busy</span>
        </div>
      </div>

    </section>
  </main>

  <div class="toast" id="toast">
    <div class="toast-ck">✓</div>
    <span>تم نسخ: gdmi_3</span>
  </div>

  <script>
    const USERNAME = "gdmi_3";

    /* Particles */
    (function() {
      const c = document.getElementById('particles');
      const cols = ['rgba(168,85,247,.6)','rgba(34,211,238,.5)','rgba(245,158,11,.38)','rgba(255,255,255,.4)'];
      for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'ptcl';
        const sz = 1.2 + Math.random() * 2.8;
        const op = (0.3 + Math.random() * 0.5).toFixed(2);
        p.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;bottom:${(-5-Math.random()*35).toFixed(0)}px;background:${cols[Math.floor(Math.random()*cols.length)]};--op:${op};--dx:${((Math.random()-.5)*65).toFixed(0)}px;animation-duration:${(9+Math.random()*12).toFixed(1)}s;animation-delay:${(Math.random()*11).toFixed(1)}s;`;
        c.appendChild(p);
      }
    })();

    /* Banner stars */
    (function() {
      const c = document.getElementById('bstars');
      for (let i = 0; i < 22; i++) {
        const s = document.createElement('div');
        s.className = 'bstar';
        const sz = .7 + Math.random() * 2.2;
        s.style.cssText = `width:${sz}px;height:${sz}px;top:${(Math.random()*92).toFixed(0)}%;left:${(Math.random()*98).toFixed(0)}%;animation-duration:${(1.4+Math.random()*3).toFixed(1)}s;animation-delay:${(Math.random()*3.5).toFixed(1)}s;`;
        c.appendChild(s);
      }
    })();

    /* Typing messages loop */
    const msgs = [
      'شلوضع؟؟',
      'انسخ الديسكورد وضيفني',
      'هل الصفحة كويسة؟',
      'الوضع بده ردع يخوي',
    ];
    let mi = 0;
    function cycleTyping() {
      const el = document.getElementById('typingText');
      el.style.opacity = '0';
      setTimeout(() => {
        mi = (mi + 1) % msgs.length;
        el.textContent = msgs[mi];
        el.style.transition = 'opacity .4s ease';
        el.style.opacity = '1';
      }, 300);
    }
    setInterval(cycleTyping, 3500);

    /* Copy */
    async function doCopy() {
      try { await navigator.clipboard.writeText(USERNAME); }
      catch {
        const t = document.createElement('textarea');
        t.value = USERNAME; t.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      }
      showToast(); flashBtn();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      clearTimeout(window._tt);
      window._tt = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function flashBtn() {
      const inner = document.getElementById('btnInner');
      const txt = document.getElementById('btnText');
      txt.textContent = '✓  تم النسخ!';
      inner.style.background = 'linear-gradient(135deg,rgba(74,222,128,.92),rgba(34,211,238,.9))';
      inner.style.boxShadow = '0 0 38px rgba(74,222,128,.38), 0 8px 22px rgba(0,0,0,.4)';
      clearTimeout(window._bt);
      window._bt = setTimeout(() => {
        txt.textContent = USERNAME;
        inner.style.background = '';
        inner.style.boxShadow = '';
      }, 1600);
    }

    document.getElementById('copyBtn').addEventListener('click', function(e) {
      doCopy();
      const r = this.getBoundingClientRect();
      const rpl = document.createElement('span');
      rpl.className = 'ripple-ring';
      const sz = Math.max(r.width, r.height);
      rpl.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px;`;
      this.appendChild(rpl);
      setTimeout(() => rpl.remove(), 700);
    });

    /* Wave button */
    let waveCooldown = false;
    document.getElementById('waveBtn').addEventListener('click', function() {
      if (waveCooldown) return;
      waveCooldown = true;
      const em = document.getElementById('waveEmoji');
      em.classList.add('waving');
      setTimeout(() => em.classList.remove('waving'), 650);

      showPopup('👋', 'Wave sent!', 'شكلك ضغطت عليه وانت مش عارف لايش الزر صح؟ ');
      setTimeout(() => waveCooldown = false, 3000);
    });

    /* Ping button */
    let pingCooldown = false;
    document.getElementById('pingBtn').addEventListener('click', function() {
      if (pingCooldown) return;
      pingCooldown = true;
      const em = document.getElementById('pingEmoji');
      em.classList.add('shaking');
      setTimeout(() => em.classList.remove('shaking'), 550);

      showPopup('🔔', 'Ping!', 'انسخ  اليوزر وأرسلي رسالة من الديسكورد');
      setTimeout(() => pingCooldown = false, 3000);
    });

    /* Popup */
    function showPopup(emoji, title, body) {
      document.getElementById('popupEmoji').textContent = emoji;
      document.getElementById('popupTitle').textContent = title;
      document.getElementById('popupBody').textContent = body;
      document.getElementById('popupOverlay').classList.add('show');
    }

    document.getElementById('popupClose').addEventListener('click', () => {
      document.getElementById('popupOverlay').classList.remove('show');
    });
    document.getElementById('popupOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('show');
    });

    /* Back */
    document.getElementById('backBtn').addEventListener('click', () => {
      window.parent.postMessage({ type: 'close-discord' }, '*');
    });
  </script>
</body>
</html>
